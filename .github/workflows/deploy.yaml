name: Deploy Overpass

on:
  push:
    branches: [main]
    paths:
      - "api/**"
  workflow_dispatch:

permissions:
  deployments: write

jobs:
  deploy:
    uses: taciturnaxolotl/dots/.github/workflows/deploy-service.yml@main
    with:
      service: overpass
      health_url: https://overpass.dunkirk.sh/health
      db_path: /var/lib/overpass/data/overpass.db
      work_dir: api
    secrets:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
