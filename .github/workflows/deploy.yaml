name: Deploy Gastrack

on:
  push:
    branches: [main]
    paths:
      - "api/**"
  workflow_dispatch:

permissions:
  deployments: write

jobs:
  deploy:
    uses: taciturnaxolotl/dots/.github/workflows/deploy-service.yml@main
    with:
      service: gastrack
      health_url: https://gastrack.dunkirk.sh/health
      db_path: /var/lib/gastrack/data/gastrack.db
      work_dir: api
    secrets:
      TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
